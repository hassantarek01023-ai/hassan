<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #ffe6f0;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .container {
        text-align: center;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 30px;
    }

    .btn {
        padding: 15px 30px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px;
        position: relative;
    }

    #yes {
        background-color: #ff4d6d;
        color: white;
    }

    #no {
        background-color: #555;
        color: white;
        position: absolute;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Do you love me?! 👉🏻👈🏻</h1>
    <button id="yes" class="btn" onclick="love()">Yes</button>
    <button id="no" class="btn">No</button>
</div>

<script>
    const noBtn = document.getElementById("no");

    noBtn.addEventListener("mouseover", function() {
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    function love() {
        document.body.innerHTML = "<h1 style='text-align:center; margin-top:20%; font-size:50px;'>I knew it and i love you more 💕💕💕 </h1>";
    }
</script>

</body>
</html>
